name: Latest Blog Posts

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest blog posts into README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://acha.xx.kg/atom.xml"
          comment_tag_name: "BLOG-POST-LIST"
          max_post_count: 5
